spring.application.name=quiz-backend
# Server Configuration
# This tells Spring to use Railway's port, or 8081 only as a local backup
server.port=${PORT:8081}

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/quiz_db
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# File Upload (for future use)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.cors.allowed-origins=http://localhost:5173,https://quiz-system-frontend.vercel.app

# Tell Flyway to recognize your existing database as version 1
spring.flyway.baseline-on-migrate=true
# Allow Flyway to run even if the migration folder is empty for now
spring.flyway.fail-on-missing-locations=true