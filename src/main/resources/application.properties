spring.application.name=quiz-backend
server.port=${PORT:8081}

# --- Database Configuration (Aiven) ---
# Aiven requires SSL (ssl-mode=REQUIRED). 
# allowMultiQueries=true helps DBeaver and some drivers handle script blocks.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate Configuration ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Flyway Configuration ---
spring.flyway.enabled=true
# Since you want to start fresh on Aiven, keep clean-disabled=false for now
spring.flyway.clean-disabled=true
# Baseline ensures Flyway creates its metadata table properly on the first run
spring.flyway.baseline-on-migrate=true
# Fixes potential folder path issues
spring.flyway.fail-on-missing-locations=true

# --- Security & Auth ---
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# --- File Upload ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- CORS ---
# --- CORS ---
# Ensure every URL starts with http:// or https:// and has NO trailing slash
app.cors.allowed-origins=http://localhost:5173,https://quiz-system-frontend.vercel.app,https://quiz-system-frontend-k5rsssgfy-yashs-projects-02ac8b49.vercel.app,https://quiz-system-frontend-git-main-yashs-projects-02ac8b49.vercel.app