spring.application.name=quiz-backend
server.port=${PORT:8081}

# -------------------------------------------------------
# Database (Aiven MySQL — SSL required)
# Values loaded from .env via java-dotenv at startup
# -------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL}?sslMode=REQUIRED&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# -------------------------------------------------------
# JPA / Hibernate
# -------------------------------------------------------
# validate = Hibernate checks the schema matches entities but does NOT alter it
# (Flyway owns all schema changes)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# -------------------------------------------------------
# Flyway
# -------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.clean-disabled=true
# baseline-on-migrate=true tells Flyway the DB already exists (tables created without Flyway)
# baseline-version=1 means "treat V1 as already applied — start running from V2"
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.fail-on-missing-locations=true
spring.flyway.locations=classpath:db/migration

# -------------------------------------------------------
# Security / Auth
# -------------------------------------------------------
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# -------------------------------------------------------
# File Upload
# -------------------------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# -------------------------------------------------------
# CORS — no trailing slashes, full origins only
# -------------------------------------------------------
app.cors.allowed-origins=http://localhost:5173,https://quiz-system-frontend.vercel.app,https://quiz-system-frontend-k5rsssgfy-yashs-projects-02ac8b49.vercel.app,https://quiz-system-frontend-git-main-yashs-projects-02ac8b49.vercel.app